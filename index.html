<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team Porygon</title>
  <style>

    /* ── PAGE BACKGROUND ── */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0d0d2b;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,50,50,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(50,50,255,0.15) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='22' stroke='%23ffffff08' stroke-width='2' fill='none'/%3E%3Cline x1='8' y1='30' x2='52' y2='30' stroke='%23ffffff08' stroke-width='2'/%3E%3C/svg%3E");
      background-size: cover, cover, 60px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* ── HEADER AREA ── */
    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .title-row img {
      width: 80px;
      height: 80px;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 12px #ff4081);
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff4081, #7c4dff, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
      text-shadow: none;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 1rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── BUTTONS ── */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .btn {
      padding: 16px 36px;
      font-size: 1.1rem;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      cursor: pointer;
    }

    /* Active button — Shiny Dex */
    .btn-active {
      background: linear-gradient(135deg, #ff4081, #7c4dff);
      color: white;
      box-shadow: 0 0 20px rgba(255, 64, 129, 0.5);
    }
    .btn-active:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 35px rgba(255, 64, 129, 0.8);
    }

    /* Disabled buttons */
    .btn-disabled {
      background: rgba(255,255,255,0.05);
      color: #666;
      border: 2px solid #333;
      cursor: not-allowed;
    }

    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 16px;
      color: #444;
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

  </style>
</head>
<body>

  <div class="header">
    <div class="title-row">
      <!-- Animated Porygon GIF -->
      <img
        src="https://play.pokemonshowdown.com/sprites/ani/porygon.gif"
        alt="Porygon"
      />
      <h1>Team Safari</h1>
      <!-- Porygon on the right too -->
      <img
        src="https://play.pokemonshowdown.com/sprites/ani/porygon.gif"
        alt="Porygon"
        style="transform: scaleX(-1);"
      />
    </div>
    <p class="subtitle">Shiny Pokémon Tracking System</p>
  </div>

  <div class="buttons">
    <!-- ✅ This button WORKS — links to shiny.html -->
    <a class="btn btn-active" href="shiny.html">✨ Shiny Dex</a>

    <!-- These buttons are placeholders for future pages -->
    <span class="btn btn-disabled">🎯 Targets</span>
    <span class="btn btn-disabled">🏆 Leaderboard</span>
    <span class="btn btn-disabled">👥 Members</span>
  </div>

  <footer>Team Porygon © 2025</footer>

</body>
</html>
