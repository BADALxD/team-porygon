<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shiny Dex – Team Porygon</title>
  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSGofC0FWGMSWZH_j2U34PVP-UOms4JX96pHUCpxz5qfm8Ni31yKui2lpXI733zTxVOC2oufQv52uU_/pub?gid=0&single=true&output=csv";

    const TYPE_COLORS = {
      normal:"#9099A1",fire:"#FF9C54",water:"#4D90D5",electric:"#F4D23C",
      grass:"#63BC5A",ice:"#74CEC0",fighting:"#CE4069",poison:"#AB6AC8",
      ground:"#D97746",flying:"#89AAE3",psychic:"#F97176",bug:"#90C12C",
      rock:"#C7B78B",ghost:"#5269AC",dragon:"#0A6DC4",dark:"#5A5366",
      steel:"#5A8EA1",fairy:"#EC8FE6"
    };

    let allPokemon = [];

    function parseCSV(text) {
      const clean = text.replace(/\r/g, "");
      const lines = clean.trim().split("\n");
      const result = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const cols = [];
        let current = "", inQuotes = false;
        for (let ch of line) {
          if (ch === '"') { inQuotes = !inQuotes; }
          else if (ch === ',' && !inQuotes) { cols.push(current.trim()); current = ""; }
          else { current += ch; }
        }
        cols.push(current.trim());
        if (cols[0]) result.push({
          name    : cols[0] || "",
          evoLine : cols[1] || "",
          obtained: (cols[2] || "").toUpperCase().trim(),
          owner   : cols[3] || "",
          proof   : cols[4] || "",
        });
      }
      return result;
    }

    async function loadSheetData() {
      const statusEl = document.getElementById("status");
      try {
        const res  = await fetch(CSV_URL);
        const text = await res.text();
        allPokemon  = parseCSV(text);
        statusEl.textContent = allPokemon.length
          ? `✅ ${allPokemon.length} Pokémon loaded`
          : "⚠️ No data found.";
      } catch {
        statusEl.textContent = "❌ Could not load sheet.";
      }
    }

    async function fetchPokeData(name) {
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name.toLowerCase().replace(/[^a-z0-9-]/g,"-")}`);
        if (!res.ok) return null;
        const d = await res.json();
        return {
          id    : d.id,
          shiny : d.sprites.front_shiny,
          types : d.types.map(t => t.type.name),
        };
      } catch { return null; }
    }

    async function searchPokemon() {
      const query   = document.getElementById("searchInput").value.trim().toLowerCase();
      const results = document.getElementById("results");
      results.innerHTML = "";

      if (!query) {
        results.innerHTML = "<p class='hint'>Type a Pokémon name above and press Search.</p>";
        return;
      }

      const matches = allPokemon.filter(p => p.name.toLowerCase().includes(query));
      if (matches.length === 0) {
        results.innerHTML = `<p class='hint'>No results for "<strong>${query}</strong>".</p>`;
        return;
      }

      results.innerHTML = `<p class='hint scanning'>⚙️ Scanning Pokédex data for ${matches.length} result(s)...</p>`;

      const cards = await Promise.all(matches.map(async pokemon => ({
        pokemon,
        poke: await fetchPokeData(pokemon.name)
      })));

      results.innerHTML = "";

      cards.forEach(({ pokemon, poke }) => {
        const obtained  = pokemon.obtained === "YES";
        const dexNum    = poke ? `#${String(poke.id).padStart(3,"0")}` : "???";
        const sprite    = poke?.shiny || `https://img.pokemondb.net/artwork/large/${pokemon.name.toLowerCase()}.jpg`;
        const fallback  = `https://img.pokemondb.net/artwork/large/${pokemon.name.toLowerCase()}.jpg`;
        const typePills = poke
          ? poke.types.map(t =>
              `<span class="type-pill" style="background:${TYPE_COLORS[t]||'#888'}">${t.toUpperCase()}</span>`
            ).join("")
          : "";

        const card = document.createElement("div");
        card.className = `card ${obtained ? "card-obtained" : "card-missing"}`;
        card.innerHTML = `
          <div class="card-left">
            <div class="dex-num">${dexNum}</div>
            <div class="sprite-wrap ${obtained ? "wrap-obtained" : "wrap-missing"}">
              <img
                src="${sprite}"
                alt="${pokemon.name}"
                class="poke-sprite ${!obtained ? "grayscale" : ""}"
                onerror="this.src='${fallback}'"
              />
              <div class="sprite-shine"></div>
            </div>
            <div class="capture-label ${obtained ? "label-caught" : "label-missing"}">
              ${obtained ? "✨ SHINY" : "NOT YET"}
            </div>
          </div>

          <div class="card-right">
            <div class="name-row">
              <h2 class="poke-name">${pokemon.name.charAt(0).toUpperCase() + pokemon.name.slice(1)}</h2>
              <span class="status-dot ${obtained ? "dot-green" : "dot-red"}"></span>
            </div>

            ${typePills ? `<div class="type-row">${typePills}</div>` : ""}
            ${pokemon.evoLine ? `<p class="evo-line">🔗 Evo Line: <em>${pokemon.evoLine}</em></p>` : ""}

            <div class="info-grid">
              <div class="info-item">
                <span class="info-label">STATUS</span>
                <span class="info-value ${obtained ? "val-green" : "val-red"}">${obtained ? "OBTAINED" : "NOT YET"}</span>
              </div>
              ${obtained && pokemon.owner ? `
              <div class="info-item">
                <span class="info-label">OWNER</span>
                <span class="info-value">${pokemon.owner}</span>
              </div>` : ""}
            </div>

            ${obtained && pokemon.proof
              ? `<a class="proof-btn" href="${pokemon.proof}" target="_blank">📸 View Proof</a>`
              : obtained
                ? `<span class="proof-btn proof-none">📎 No Proof Added</span>`
                : ""}
          </div>
        `;
        results.appendChild(card);
      });
    }

    function handleKey(e) { if (e.key === "Enter") searchPokemon(); }
    window.onload = loadSheetData;
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #0a0a12;
      background-image:
        radial-gradient(ellipse at 10% 20%, rgba(220,30,30,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(80,40,180,0.10) 0%, transparent 50%);
      min-height: 100vh;
      color: #fff;
      padding: 28px 20px 80px;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 800px;
      margin: 0 auto 36px;
    }

    .back-btn {
      color: #666;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { color: #e53935; }

    #status {
      font-size: 0.78rem;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── TITLE ── */
    .title-block {
      text-align: center;
      margin-bottom: 36px;
    }

    .dex-badge {
      display: inline-block;
      background: #e53935;
      color: white;
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff6b6b 0%, #c62828 40%, #9c27b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .subtitle {
      color: #444;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      max-width: 600px;
      margin: 0 auto 48px;
      display: flex;
      gap: 12px;
    }

    #searchInput {
      flex: 1;
      background: #13131e;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 14px 20px;
      color: #fff;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    #searchInput:focus {
      border-color: #e53935;
      box-shadow: 0 0 0 3px rgba(229,57,53,0.15);
    }
    #searchInput::placeholder { color: #333; }

    .search-btn {
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .search-btn:hover {
      background: #c62828;
      transform: translateY(-2px);
    }

    /* ── RESULTS ── */
    #results {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hint {
      text-align: center;
      color: #333;
      font-size: 0.9rem;
      padding: 40px 0;
      letter-spacing: 0.5px;
    }
    .scanning { color: #666; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── CARD ── */
    .card {
      display: flex;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #1a1a26;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .card-obtained {
      background: linear-gradient(135deg, #0f1520 0%, #111827 100%);
      border-color: rgba(255,180,0,0.2);
      box-shadow: 0 0 0 1px rgba(255,180,0,0.08);
    }
    .card-missing {
      background: #0e0e16;
      border-color: #1a1a22;
    }

    /* Left accent bar */
    .card-obtained::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #ffd700, #ff8c00);
      border-radius: 16px 0 0 16px;
    }
    .card-missing::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: #222;
      border-radius: 16px 0 0 16px;
    }

    /* ── CARD LEFT ── */
    .card-left {
      width: 150px;
      min-width: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 10px;
      background: rgba(255,255,255,0.02);
      border-right: 1px solid #1a1a26;
      gap: 8px;
    }

    .dex-num {
      font-size: 0.7rem;
      color: #444;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .sprite-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap-obtained {
      background: radial-gradient(circle, rgba(255,215,0,0.12) 0%, rgba(255,140,0,0.05) 60%, transparent 100%);
      box-shadow: 0 0 24px rgba(255,215,0,0.12), inset 0 0 12px rgba(255,215,0,0.06);
    }
    .wrap-missing {
      background: radial-gradient(circle, rgba(80,80,100,0.1) 0%, transparent 70%);
    }

    .poke-sprite {
      width: 80px;
      height: 80px;
      object-fit: contain;
      image-rendering: pixelated;
      position: relative;
      z-index: 1;
      transition: transform 0.3s;
    }
    .card:hover .poke-sprite { transform: scale(1.1); }
    .grayscale { filter: grayscale(100%) brightness(0.4); }

    .capture-label {
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .label-caught {
      background: rgba(255,215,0,0.15);
      color: #ffd700;
      border: 1px solid rgba(255,215,0,0.3);
    }
    .label-missing {
      background: rgba(255,255,255,0.05);
      color: #444;
      border: 1px solid #222;
    }

    /* ── CARD RIGHT ── */
    .card-right {
      flex: 1;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .poke-name {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: capitalize;
      color: #f0f0f0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .dot-red   { background: #555; }

    .type-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .type-pill {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 20px;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .evo-line {
      font-size: 0.8rem;
      color: #555;
    }

    .info-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .info-label {
      font-size: 0.6rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .info-value {
      font-size: 0.9rem;
      font-weight: 700;
      color: #ccc;
    }
    .val-green { color: #4caf50; }
    .val-red   { color: #ef5350; }

    .proof-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.06);
      color: #aaa;
      border: 1px solid #222;
      transition: background 0.2s, color 0.2s;
      width: fit-content;
    }
    .proof-btn:not(.proof-none):hover {
      background: rgba(229,57,53,0.15);
      color: #ff6b6b;
      border-color: rgba(229,57,53,0.3);
    }
    .proof-none { cursor: default; color: #333; border-color: #1a1a1a; }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      h1 { font-size: 2rem; }
      .card-left { width: 110px; min-width: 110px; }
      .poke-name { font-size: 1.2rem; }
      .card-right { padding: 14px 16px; }
      .search-wrap { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a class="back-btn" href="index.html">← Home</a>
    <div id="status">⏳ Loading...</div>
  </div>

  <div class="title-block">
    <div class="dex-badge">Team Porygon</div>
    <h1>✨ Shiny Dex</h1>
    <p class="subtitle">Live Data · PokéAPI Powered</p>
  </div>

  <div class="search-wrap">
    <input
      type="text"
      id="searchInput"
      placeholder="Search Pokémon name... e.g. pikachu"
      onkeydown="handleKey(event)"
    />
    <button class="search-btn" onclick="searchPokemon()">Search</button>
  </div>

  <div id="results">
    <p class="hint">Type a Pokémon name above and press Search.</p>
  </div>

</body>
</html>
